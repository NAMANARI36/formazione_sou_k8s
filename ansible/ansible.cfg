# ansible.cfg — configurazioni globali del progetto
# Ansible cerca questo file nella directory da cui viene lanciato il comando.
# I path relativi partono da dove viene lanciato ansible-playbook.

[defaults]
deprecation_warnings = False

# Definisce un inventory di default, così non serve specificarlo a ogni comando.
inventory = ./inventory/hosts.yml

# Dove Ansible cerca i ruoli referenziati nei playbook.
roles_path = ./roles

# Abilita o disabilita la verifica della host key SSH a cui il control node si sta connettendo, confrontandola 
# con quelle salvate in known_hosts del control node.
host_key_checking = False

# Numero di host gestiti in parallelo (default Ansible: 5).
# Determina quanti processi worker(figli) Ansible può avviare per eseguire un task contemporaneamente su più host.
forks = 5

# Formatta l'output dei risultati dei task in YAML indentato invece che
# JSON compatto su una riga. Solo leggibilità, utile in debugging.
result_format = yml

# Non stampare i task skippati
display_skipped_hosts = False

# Auto-discovery dell'interprete Python sui managed nodes, silenziando
# il warning relativo. Ansible trova da solo /usr/bin/python3 su Rocky 9.
interpreter_python = auto_silent

[privilege_escalation]
# Attiva l'escalation di privilegi per tutti i task.
become = False

# Specifica lo strumento con cui effettuare il cambio di utente per eseguire i task.
become_method = sudo

# Specifica l'utente di destinazione, cioè con quale identità verranno eseguiti i task dopo il cambio
become_user = root

# Permette l'esecuzione delle task senza fare la richiesta interattiva della password sudo all'avvio del playbook.
# Utile se è stato impostato sudo senza password per l'utente ansible sui managed nodes. In caso contrario, Ansible fallirà se è richiesta la password sudo.
become_ask_pass = False

[ssh_connection]
# Abilitare il pipelining riduce il numero di round-trip SSH necessari per eseguire i task,
# facendo eseguire direttamente il codice Python dei moduli all'interprete Python remoto,
# senza dover prima copiare il modulo come file temporaneo sul managed node prima di eseguirlo.
pipelining = True

# ControlMaster=auto: crea una connessione SSH master condivisa e la riusa
#   per le connessioni successive allo stesso host (multiplexing).
# ControlPersist=60s: mantiene aperta la connessione master per 60s dopo
#   l'ultimo uso, così i task successivi la riutilizzano senza riautenticarsi.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

# Path del socket di controllo per la connessione persistente.
# I %% sono escape: nel file .cfg '%' va raddoppiato perché non venga
# interpretato come variabile di configurazione. %h=host, %p=porta, %r=utente remoto.
control_path = ~/.ansible/cp/%%h-%%p-%%r