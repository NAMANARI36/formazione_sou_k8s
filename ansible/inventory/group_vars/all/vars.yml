# Questo file contiene variabili del gruppo speciale "all". 
# Un gruppo è un insieme di host raggruppati sotto un nome comune.
# I gruppi sono utili per organizzare gli host in base a caratteristiche condivise.
# all è il gruppo padre che contiene tutti gli altri gruppi e host.
# Qui vanno definite tutte le variabili condivise da tutti i nodi gestiti da Ansible.


# Variabili per Ansible dove definiamo l'utente SSH di default che Ansible utilizzerà per connettersi agli host.
ansible_user: vagrant
# Path dell'interprete Python da usare sugli host gestiti da Ansible.
ansible_python_interpreter: /usr/bin/python3

dockerhub_credentials_id: dockerhub-credentials
dockerhub_username: namanari36

# region Rete Podman
# Variabili della rete Podman che sarà creata sul nodo gestito da Ansible.
podman_network_name: jenkins-net
podman_network_subnet: 10.89.0.0/24
podman_network_gateway: 10.89.0.1

# Ip statici dei container Jenkins Controller e Jenkins Agent, che saranno connessi alla rete Podman definita sopra.
jenkins_controller_ip: 10.89.0.10
jenkins_agent_ip: 10.89.0.11 
# endregion

# region Jenkins Controller: variabili di accesso
jenkins_admin_user: admin
jenkins_admin_password: "{{ vault_jenkins_admin_password }}" # Riferimento a una variabile segreta definita nel vault Ansible, che contiene la password dell'utente admin di Jenkins.
# endregion

# region Variabili per il Jenkins Agent, utilizzate nei tasks e nel file di configurazione jenkins-agent.container (Quadlet)
jenkins_agent_node_name: agent-1 # nome che identifica in modo univoco il nodo agent sul controller
jenkins_agent_label: build # label che identifica le capacità del nodo agent
jenkins_agent_workdir: /home/jenkins/agent # specifica il percorso dove Jenkins creerà la sua directory di lavoro sull'Agent
jenkins_agent_executors: 1 # numero di esecutori che il nodo agent può utilizzare per gestire contemporaneamente più jobs.
jenkins_agent_container_name: jenkins-agent # Nome del container e della unit systemd generata da Quadlet.
jenkins_agent_image: jenkins-agent # Immagine custom costruita localmente dal Dockerfile del ruolo.
jenkins_agent_image_tag: latest-custom # Tag dell'immagine custom dell'agent, che sarà buildata localmente dal Dockerfile del ruolo.
jenkins_agent_build_dir: /opt/jenkins-agent-build 
# Directory sulla VM che fa da contesto di build (Dockerfile) Qui Ansible prepara tutto prima della podman build.
jenkins_agent_start_timeout: 120 # Timeout di avvio del servizio (secondi).
jenkins_agent_wait_retries: 20 # Numero di tentativi
jenkins_agent_wait_delay: 6 # Numero di secondi di attesa tra un tentativo e l'altro

# endregion

# region Variabili per il Jenkins Controller, utilizzate nei tasks e nel file di configurazione jenkins.yaml (JCasC) e jenkins-controller.container (Quadlet)
jenkins_controller_num_executors: 0 # Impostato a 0 perchè il controller non deve eseguire build ma delegare
jenkins_controller_container_http_port: 8080 # Porta HTTP su cui il container del Jenkins Controller espone la web UI e l'API.
jenkins_controller_url: "http://{{ jenkins_controller_ip }}:{{ jenkins_controller_container_http_port }}" # URL base del controller (Jenkins URL)
jenkins_controller_container_name: jenkins-controller # Nome del container e della relativa unit systemd generata da Quadlet.
jenkins_controller_image: jenkins-controller # Immagine custom costruita localmente dal Dockerfile del ruolo.
jenkins_controller_image_tag: latest-custom # Tag dell'immagine custom del controller, che sarà buildata localmente dal Dockerfile del ruolo.
jenkins_controller_build_dir: /opt/jenkins-controller-build
# Directory sulla VM che fa da contesto di build (Dockerfile, plugins.txt,
# jenkins.yaml renderizzato). Qui Ansible prepara tutto prima della podman build.

jenkins_controller_volume_name: jenkins_home # Named volume Podman che persiste la configurazione e i job di Jenkins.
jenkins_controller_home_dir: /var/jenkins_home # Path interno al container dove Jenkins persiste la sua configurazione e i job.
jenkins_controller_host_http_port: 8080 # Porta della vm sulla quale verrà esposto il container del Jenkins Controller grazie al port forwarding
jenkins_controller_start_timeout: 300 # Timeout di avvio del servizio (secondi)
jenkins_controller_wait_retries: 30 # Numero di tentativi
jenkins_controller_wait_delay: 10 # Numero di secondi di attesa tra un tentativo e l'altro

# endregion

# Socket API di Podman sull'host VM (rootful), montato nell'agent per la build.
podman_host_socket: /run/podman/podman.sock